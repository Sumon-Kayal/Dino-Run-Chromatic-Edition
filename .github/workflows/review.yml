name: PR Review Bot

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
 

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
       - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
 
      - name: Get diff
        run: |
          curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          ${{ github.event.pull_request.diff_url }} > diff.txt

      - name: Run review script
        run: node scripts/review.js

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: review.md
